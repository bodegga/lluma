# DigitalOcean App Platform — static site spec for the Lluma marketing site.
# Deploy with:  doctl apps create --spec apps/lluma-web/.do/app.yaml
# Update with:  doctl apps update <APP_ID> --spec apps/lluma-web/.do/app.yaml
#
# Uses a public git clone (no GitHub OAuth integration needed). To enable
# auto-deploy-on-push instead, connect DigitalOcean's GitHub app to the bodegga
# org in the DO dashboard, then swap the `git:` block for:
#   github: { repo: bodegga/lluma, branch: main, deploy_on_push: true }
# The site is a single self-contained index.html — no build step.
name: lluma-web
region: nyc
domains:
  - domain: lluma.bodegga.net
    type: PRIMARY
static_sites:
  - name: site
    git:
      repo_clone_url: https://github.com/bodegga/lluma.git
      branch: main
    source_dir: apps/lluma-web
    index_document: index.html
    catchall_document: index.html   # serves index.html for any path (single-page site)
    routes:
      - path: /
